services:
  # The API already has volume mapping in the main docker-compose.yml.
  # We add the frontend mapping here for local development.
  frontend:
    image: node:20-slim
    platform: linux/amd64
    volumes:
      - ./frontend:/app
      - /app/node_modules # Avoid Windows node_modules conflicts
    working_dir: /app
    # In development, we ensure dependencies are installed then run dev server
    command: sh -c "npm install && npm run dev -- --host --port 80"
    environment:
      - VITE_PROXY_TARGET=http://api:9000
      - VITE_API_BASE_URL=http://localhost:9000
