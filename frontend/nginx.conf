server {
    listen 80;
    server_name localhost;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static files (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Dynamic Proxy for Hybrid Local/Staging support
    # Using __PLACEHOLDERS__ to avoid any conflict with Nginx internal variables
    location ~ ^/(auth|users|expenses|budgets|analytics|income|savings|goals|recurring|notifications|payments|health|meta)/ {
        proxy_pass __API_URL__;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host __API_HOST__;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
