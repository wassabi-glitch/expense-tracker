server {
    listen 80;
    server_name localhost;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Handle React routing (SPA)
    }

    # Proxy API requests to the backend container
    # We use these specific prefixes to match our FastAPI routes
    location /auth/ {
        proxy_pass http://api:9000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /users/ {
        proxy_pass http://api:9000/users/;
        proxy_set_header Host $host;
    }

    location /expenses/ {
        proxy_pass http://api:9000/expenses/;
        proxy_set_header Host $host;
    }

    location /budgets/ {
        proxy_pass http://api:9000/budgets/;
        proxy_set_header Host $host;
    }

    location /analytics/ {
        proxy_pass http://api:9000/analytics/;
        proxy_set_header Host $host;
    }

    location /income/ {
        proxy_pass http://api:9000/income/;
        proxy_set_header Host $host;
    }

    location /savings/ {
        proxy_pass http://api:9000/savings/;
        proxy_set_header Host $host;
    }

    location /goals/ {
        proxy_pass http://api:9000/goals/;
        proxy_set_header Host $host;
    }

    location /recurring/ {
        proxy_pass http://api:9000/recurring/;
        proxy_set_header Host $host;
    }

    location /notifications/ {
        proxy_pass http://api:9000/notifications/;
        proxy_set_header Host $host;
    }

    location /health/ {
        proxy_pass http://api:9000/health/;
        proxy_set_header Host $host;
    }

    # Meta/Categories
    location /categories/ {
        proxy_pass http://api:9000/categories/;
        proxy_set_header Host $host;
    }
}
