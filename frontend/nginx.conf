server {
    listen 80;
    server_name localhost;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static files (React SPA)
    location / {
        add_header Vary Accept;
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Serve Vite static assets and prevent API proxy regex from swallowing them
    location ^~ /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
    }

    location ~ ^/(auth|users|expenses|budgets|analytics|income|money-in|savings|goals|recurring|notifications|payments|health|meta|debts|installments|wallets|assets|projects)(/|$) {
        
        # Bypass for colliding UI routes: If browser requests HTML, serve React app
        set $serve_html 0;
        set $is_colliding 0;
        
        if ($uri ~* "^/(expenses|budgets|analytics|income|savings|debts|wallets|assets)(/|$)") {
            set $is_colliding 1;
        }

        if ($http_accept ~* "text/html") {
            set $serve_html $is_colliding;
        }
        
        if ($request_uri ~* "/export") {
            set $serve_html 0;
        }
        
        if ($serve_html = 1) {
            add_header Vary Accept;
            rewrite ^ /index.html last;
        }

        proxy_pass __REPLACE_ME_WITH_API_URL__;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name __REPLACE_ME_WITH_API_HOST__;
        proxy_buffer_size   128k;
        proxy_buffers   4 256k;
        proxy_busy_buffers_size   256k;
        proxy_set_header Host __REPLACE_ME_WITH_API_HOST__;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
